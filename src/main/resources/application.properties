server.port=8081

spring.datasource.url=jdbc:postgresql://${PG_HOST}:5432/${DATABASE_NAME}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Actuator
management.endpoints.web.exposure.include=mappings,beans,caches,env,metrics,shutdown,auditevents,threaddump
management.endpoint.env.show-values=always

# File settings
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB

# Create table by entities
spring.jpa.hibernate.ddl-auto=update

#Log settings from Logback in SpringBoot
logging.level.root=INFO
logging.file.name=logs/spring-boot-log.log

jwt.expiration=${JWT_EXPIRATION:5}
jwt.secret=${JWT_SECRET}